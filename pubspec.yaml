name: speech_roulette
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^13.0.1
  http: ^1.2.1
  flutter_dotenv: ^5.1.0



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/img/difficulty/easy.png
    - assets/img/difficulty/medium.png
    - assets/img/difficulty/hard.png
    - assets/img/difficulty/off.png
    - assets/img/logo.png
    - assets/img/gif/penguin.gif
  fonts:
    - family: SpongeBoy
      fonts:
        - asset: assets/fonts/SpongeBoyMeBob.ttf
